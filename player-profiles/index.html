<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jucători · U-BT Cluj-Napoca Stats</title>
  <meta name="description" content="Statistici complete per jucător pentru U-BT Cluj-Napoca — EuroCup, ABA League, Liga Națională.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css?v=7">
</head>
<body>

<!-- ── Header ─────────────────────────────────────────────────────────── -->
<header class="site-header">
  <div class="header-inner">
    <a class="brand" href="index.html">
      <div class="brand-logo-wrap"><img src="../logo-ubt.svg" class="brand-logo-img" alt="U-BT"></div>
      <div>
        <div class="brand-name">U-BT Cluj-Napoca</div>
        <div class="brand-sub">Player Stats</div>
      </div>
    </a>
    <nav class="header-nav">
      <a class="nav-link active" href="index.html">Jucători</a>
    </nav>
  </div>
</header>

<!-- ── Page ───────────────────────────────────────────────────────────── -->
<main class="page">

  <!-- Controls -->
  <div class="controls">
    <!-- Search -->
    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input id="search-input" class="search-input" type="search"
             placeholder="Caută jucător…" autocomplete="off" spellcheck="false">
    </div>

    <!-- Competition filter -->
    <div class="filter-group">
      <button class="filter-btn active" data-comp="all">Toate</button>
      <button class="filter-btn" data-comp="eurocup">EuroCup</button>
      <button class="filter-btn" data-comp="aba_league">ABA</button>
      <button class="filter-btn" data-comp="liga_nationala">LN</button>
    </div>

    <!-- Sort -->
    <div class="sort-wrap">
      <svg class="sort-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M2 4h12M4 8h8M6 12h4"/>
      </svg>
      <span class="sort-label">Ordonează după</span>
      <select id="sort-select" class="sort-select">
        <option value="points_pg">Puncte pe meci</option>
        <option value="pir">Eficiență (PIR)</option>
        <option value="assists_pg">Pase decisive pe meci</option>
        <option value="rebounds_pg">Recuperări pe meci</option>
        <option value="blocks_pg">Blocaje pe meci</option>
        <option value="minutes_pg">Minute jucate pe meci</option>
        <option value="player_name">Nume A–Z</option>
      </select>
    </div>

    <span id="results-count" class="results-count"></span>
  </div>

  <!-- Grid — filled by app.js -->
  <div id="player-grid" class="player-grid"></div>

</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"
        integrity="sha512-dfX5uYVXzyU8+KHqj8bjo7UkOdg18PaOtpa48djpNbZHwExddghZ+ZmzWT06R5v6NSk3ZUfsH6FNEDepLx9hPQ=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script src="assets/app.js?v=7"></script>
</body>
</html>
